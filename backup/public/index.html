<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackMagic-X | Universal Engine</title>
    <link rel="stylesheet" href="style.css">

    <!-- Babylon.js Core and Dependencies -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    <script src="https://code.jquery.com/pep/0.4.3/pep.js"></script>
</head>

<body>
    <!-- The 3D Canvas -->
    <canvas id="renderCanvas" touch-action="none"></canvas>

    <!-- Crosshair for Free Look -->
    <div id="crosshair"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="title-container" id="welcomeUI">
            <h1>BLACKMAGIC-X</h1>
        </div>
    </div>

    <!-- Instructions Text -->
    <div id="instructions">
        Left Click: Rotate (Inertia) | Right Click: Pan (Altitude Scaling) | Scroll: Zoom to Cursor
    </div>

    <!-- Phase 2: WASM Engine Core -->
    <script src="wasm/engine.js"></script>
    <script src="main.js"></script>
</body>

</html>
